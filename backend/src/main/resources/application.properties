# Local dev fallback to H2 in-memory database (easiest for demo/running without cloud DB)
# Uncomment postgres settings for production when db reachable.

spring.datasource.url=jdbc:h2:mem:online_voting;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

